name: Build and Release Zen Browser

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Zen Browser APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev python3-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install glean_parser==18.2.0

      - name: Build Zen Browser Alpha
        run: | 
          chmod +x gradlew
          ./gradlew assembleZenDebug --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/zenDebug/*.apk Zen-Browser-v1.0-Alpha.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Zen-Browser-v1.0-Alpha.apk
          name: Zen Browser for Android Alpha ${{ github.ref_name }}
          body: |
            ## Zen Browser for Android (Alpha)
            Initial Port of Zen Browser to Android.
            
            ### Key Features
            - **SDK 34 Stabilization**: Corrected runtime crashes on Android 14.
            - **Official Rebranding**: Fully integrated Zen Browser identity and iconography.
            - **GeckoView Integration**: Powered by the latest Gecko engine.
            
            ### Installation
            Download the APK below and install it on your Android device.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
